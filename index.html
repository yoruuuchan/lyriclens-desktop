<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LyricLens</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app">
      <header class="now-playing">
        <div class="title" id="np-title">—</div>
        <div class="meta">
          <span id="np-artist">—</span>
          <span class="dot" aria-hidden="true">·</span>
          <span id="np-album">—</span>
        </div>
        <div class="status">
          <span class="badge" id="np-status">idle</span>
          <span class="timing" id="np-timing">00:00 / 00:00</span>
        </div>
      </header>

      <section class="lyrics" id="lyrics" aria-live="polite">
        <p class="placeholder">Start playing something — SMTC will pick it up.</p>
      </section>

      <footer class="actions">
        <button id="btn-refresh" type="button">Refresh now</button>
        <span class="hint" id="hint">polling 1s</span>
      </footer>
    </main>
  </body>
</html>
