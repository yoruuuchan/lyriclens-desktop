name = "lrclib-proxy"
main = "worker.js"
compatibility_date = "2026-06-01"
workers_dev = false

# Route the Worker to the lrclib subdomain of yoru-and-akari.dev. The
# DNS record (AAAA 100:: proxied=true) is created via the API alongside
# the first deploy — see deploy.sh.
routes = [
  { pattern = "lrclib.yoru-and-akari.dev/*", zone_id = "4f9b5c7236e63090439676eec70031e2" }
]
